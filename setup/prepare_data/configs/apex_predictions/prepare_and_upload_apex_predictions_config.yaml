# Configuration for batched APEX prediction + upload as sidecar subset

prepare:
  dataset_name: pszmk/LAMP-datasets
  dataset_config: nvidia_esm2_uniref_pretraining_data_leq50aa
  split: null # all splits
  peptide_id_column: ur90_id
  sequence_column: sequence
  device: cuda
  batch_size: 8192
  chunk_size: 20000
  path_mode: apex_pathogen # or apex_full_pathogen
  use_tqdm: true

upload:
  repo_id: pszmk/LAMP-datasets
  subset_name: apex_predictions
  commit_message: "Add APEX pathogen MIC sidecar predictions"
