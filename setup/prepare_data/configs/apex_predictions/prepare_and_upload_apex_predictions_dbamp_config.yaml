# APEX MIC predictions over the dbAMP subset, uploaded as a sidecar subset.
# Joins to dbamp_peptides_leq50aa via dbamp_id.

prepare:
  dataset_name: pszmk/LAMP-datasets
  dataset_config: dbamp_peptides_leq50aa
  split: null # all splits (dbAMP subset only has `train`)
  peptide_id_column: dbamp_id
  sequence_column: sequence
  device: cuda
  batch_size: 8192
  chunk_size: 20000
  path_mode: apex_pathogen # or apex_full_pathogen
  use_tqdm: true

upload:
  repo_id: pszmk/LAMP-datasets
  subset_name: apex_predictions_dbamp_leq50aa
  commit_message: "Add APEX pathogen MIC sidecar for dbAMP v3.0 ≤50 AA peptides"
