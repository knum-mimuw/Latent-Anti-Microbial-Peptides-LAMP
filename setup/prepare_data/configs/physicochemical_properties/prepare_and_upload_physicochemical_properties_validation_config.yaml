# Configuration for physicochemical feature sidecar generation + upload (validation split)

prepare:
  dataset_name: pszmk/LAMP-datasets
  dataset_config: nvidia_esm2_uniref_pretraining_data_leq50aa
  split: validation
  peptide_id_column: ur90_id
  sequence_column: sequence
  batch_size: 50000
  use_tqdm: false
  ph: 7.0
  hydrophobicity_scale: Aboderin
  properties:
    - charge
    - hydrophobicity
    - isoelectric_point
    - molecular_weight
    - instability_index
    - gravy
    - aliphatic_index
    - boman_index

upload:
  repo_id: pszmk/LAMP-datasets
  subset_name: physicochemical_properties
  split: validation
  commit_message: "Add physicochemical properties sidecar features (validation split)"
  token: null # Uses HF_TOKEN when null
