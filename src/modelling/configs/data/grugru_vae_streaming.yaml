train_datasets:
  train:
    hf_kwargs:
      path: pszmk/LAMP-datasets
      name: nvidia_esm2_uniref_pretraining_data_leq50aa
      split: train
      streaming: true
    shuffle_kwargs:
      buffer_size: 10000

val_datasets:
  val:
    hf_kwargs:
      path: pszmk/LAMP-datasets
      name: nvidia_esm2_uniref_pretraining_data_leq50aa
      split: validation
      streaming: true

collate:
  collate_class: modelling.src.datamodules.collate.TokenizerCollate
  collate_config_class: modelling.src.datamodules.collate.TokenizerCollateConfig
  collate_kwargs:
    tokenizer_path: pszmk/protein-aa-fast-tokenizer
    sequence_column: sequence
    tokenizer_kwargs:
      padding: longest
      return_tensors: pt
    add_shifted_labels: true
